    <!-- Google Fonts -->

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        #chat-box {
            height: 420px;
            overflow-y: auto;

            border-radius: 10px;
            padding: 15px;
        }

        }
        .chat-user span {

            padding: 8px 12px;
            border-radius: 12px;

        }
        .chat-bot span {

            padding: 8px 12px;
            border-radius: 12px;
            display: inline-block;
            max-width: 80%;
        }
    </style>
</head>

<body>

<!-- Spinner -->
<div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
    <div class="spinner-grow text-primary"></div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white navbar-light shadow-sm px-5 py-3 py-lg-0">
    <a href="{{ url_for('patient_dashboard') }}" class="navbar-brand p-0">
        <h1 class="m-0 text-primary"><i class="fa fa-brain"></i>DementiaCare</h1>
    </a>
    <div class="collapse navbar-collapse">
        <div class="navbar-nav ms-auto py-0">
            <a href="{{ url_for('patient_dashboard') }}" class="nav-item nav-link">Dashboard</a>
            <a href="{{ url_for('logout') }}" class="nav-item nav-link text-danger">Logout</a>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="container-fluid bg-primary py-5 hero-header mb-5">
    <div class="row py-3">
        <div class="col-12 text-center">
            <h1 class="display-3 text-white animated zoomIn">AI Dementia Care Chatbot</h1>
            <a href="{{ url_for('patient_dashboard') }}" class="h4 text-white">Dashboard</a>
            <i class="far fa-circle text-white px-2"></i>
            <a href="#" class="h4 text-white">Chatbot</a>
        </div>
    </div>
</div>

<!-- Chatbot -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="bg-light rounded shadow p-4 wow fadeInUp">

                <h4 class="text-center text-primary mb-3">
                    <i class="fa fa-robot"></i> Ask Anything About Dementia Care
                </h4>

                <div id="chat-box"></div>

                <div class="input-group mt-3">
                    <input type="text" id="user-input" class="form-control" placeholder="Type your question here...">
                    <button class="btn btn-primary" id="send-btn">
                        <i class="fa fa-paper-plane"></i>
                    </button>
                    <button class="btn btn-success" id="voice-btn">
                        <i class="fa fa-microphone"></i>
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="container-fluid bg-dark text-light py-4 text-center">
    &copy; DementiaCare. All Rights Reserved.
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/assets/js/main.js"></script>
    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square rounded back-to-top"><i class="bi bi-arrow-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/assets/lib/wow/wow.min.js"></script>
    <script src="../static/assets/lib/easing/easing.min.js"></script>
    <script src="../static/assets/lib/waypoints/waypoints.min.js"></script>
    <script src="../static/assets/lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="../static/assets/lib/tempusdominus/js/moment.min.js"></script>
    <script src="../static/assets/lib/tempusdominus/js/moment-timezone.min.js"></script>
    <script src="../static/assets/lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js"></script>
    <script src="../static/assets/lib/twentytwenty/jquery.event.move.js"></script>
    <script src="../static/assets/lib/twentytwenty/jquery.twentytwenty.js"></script>

    <!-- Template Javascript -->
    <script src="../static/assets/js/main.js"></script>
<script>
const chatBox = document.getElementById('chat-box');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const voiceBtn = document.getElementById('voice-btn');

function addMessage(sender, message) {
    const div = document.createElement('div');
    div.className = sender === "You" ? 'chat-user' : 'chat-bot';
    div.innerHTML = `<span>${message}</span>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Send text
sendBtn.addEventListener('click', () => {
    const text = userInput.value.trim();
    if (!text) return;
    addMessage("You", text);
    userInput.value = '';

    fetch('/patient/chatbot_query', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'question=' + encodeURIComponent(text)
    })
    .then(res => res.json())
    .then(data => {
        addMessage("Bot", data.response);
        const msg = new SpeechSynthesisUtterance(data.response);
        window.speechSynthesis.speak(msg);
    });
});

// Voice input
voiceBtn.addEventListener('click', () => {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.start();
    recognition.onresult = e => {
        userInput.value = e.results[0][0].transcript;
        sendBtn.click();
    };
});
</script>

</body>
</html>

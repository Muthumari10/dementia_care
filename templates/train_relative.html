<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Train Relative | Dementia Care</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/bootstrap.min.css') }}">
</head>
<body>
<div class="container mt-5">
    <h2>Enroll a Relative</h2>
    <hr>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-info">
          {% for msg in messages %}{{ msg }}{% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Relative Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Relative Type</label>
            <select name="relative_type" class="form-select" required>
                <option value="">Select Type</option>
                <option value="Family">Family</option>
                <option value="Friend">Friend</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Start Enrollment</button>
    </form>
</div>
</body>
</html>

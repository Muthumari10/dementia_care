<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>DementiaCare | Admin Login</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Favicon -->
    <link href="../static/assets/img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"> 

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="../static/assets/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="../static/assets/lib/animate/animate.min.css" rel="stylesheet">
    <link href="../static/assets/lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css" rel="stylesheet" />
    <link href="../static/assets/lib/twentytwenty/twentytwenty.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="../static/assets/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="../static/assets/css/style.css" rel="stylesheet">
</head>

<body>

<!-- Spinner -->
<div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
    <div class="spinner-grow text-primary"></div>
</div>

   <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg bg-white navbar-light shadow-sm px-5 py-3 py-lg-0">
        <a href="index.html" class="navbar-brand p-0">
            <h1 class="m-0 text-primary"><i class="fa fa-brain"></i>DementiaCare</h1>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ms-auto py-0">
                <a href="/" class="nav-item nav-link active">Home</a>
                <a href="admin/login" class="nav-item nav-link">Admin</a>
                <a href="/patient/login" class="nav-item nav-link">Patient</a>
                <a href="/caregiver/login" class="nav-item nav-link">CareGiver</a>
            </div>
            <a href="/patient/register" class="btn btn-primary py-2 px-4 ms-3">Register</a>
        </div>
    </nav>
    <!-- Navbar End -->

<!-- Hero Header -->
<div class="container-fluid bg-primary py-5 hero-header mb-5">
    <div class="row py-3">
        <div class="col-12 text-center">
            <h1 class="display-3 text-white animated zoomIn">Admin Login</h1>
            <a href="{{ url_for('admin_dashboard') }}" class="h4 text-white">Dashboard</a>
            <i class="far fa-circle text-white px-2"></i>
            <a href="#" class="h4 text-white">Login</a>
        </div>
    </div>
</div>

<!-- Admin Login Form -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="bg-light rounded p-5 shadow wow fadeInUp">

                <h3 class="text-center text-primary mb-4">
                    <i class="fa fa-user-shield"></i> Admin Login
                </h3>

                {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger text-center">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <input type="text" name="username" placeholder="Username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" name="password" placeholder="Password" class="form-control" required>
                    </div>

                    <div class="text-center mt-4">
                        <button class="btn btn-primary px-5 py-2">
                            <i class="fa fa-sign-in-alt"></i> Login
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="container-fluid bg-dark text-light py-4 text-center">
    &copy; DementiaCare. All Rights Reserved.
</div>
    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square rounded back-to-top"><i class="bi bi-arrow-up"></i></a>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/assets/lib/wow/wow.min.js"></script>
    <script src="../static/assets/lib/easing/easing.min.js"></script>
    <script src="../static/assets/lib/waypoints/waypoints.min.js"></script>
    <script src="../static/assets/lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="../static/assets/lib/tempusdominus/js/moment.min.js"></script>
    <script src="../static/assets/lib/tempusdominus/js/moment-timezone.min.js"></script>
    <script src="../static/assets/lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js"></script>
    <script src="../static/assets/lib/twentytwenty/jquery.event.move.js"></script>
    <script src="../static/assets/lib/twentytwenty/jquery.twentytwenty.js"></script>

    <!-- Template Javascript -->
    <script src="../static/assets/js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>DementiaCare | Patient Profile</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Favicon -->
    <link href="{{ url_for('static', filename='assets/img/favicon.ico') }}" rel="icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="{{ url_for('static', filename='assets/css/bootstrap.min.css') }}" rel="stylesheet">

    <!-- Template CSS -->
    <link href="{{ url_for('static', filename='assets/css/style.css') }}" rel="stylesheet">

    <style>
        #map {
            height: 500px;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white navbar-light shadow-sm px-5 py-3 py-lg-0">
    <a href="{{ url_for('caregiver_dashboard') }}" class="navbar-brand p-0">
        <h1 class="m-0 text-primary"><i class="fa fa-brain"></i>DementiaCare</h1>
    </a>
    <div class="collapse navbar-collapse">
        <div class="navbar-nav ms-auto py-0">
            <a href="{{ url_for('caregiver_dashboard') }}" class="nav-item nav-link">Dashboard</a>
            <a href="{{ url_for('logout') }}" class="nav-item nav-link text-danger">Logout</a>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="container-fluid bg-primary py-5 hero-header mb-5">
    <div class="row py-3">
        <div class="col-12 text-center">
            <h1 class="display-3 text-white animated zoomIn">Patient Live Location</h1>
            <a href="{{ url_for('caregiver_dashboard') }}" class="h4 text-white">Dashboard</a>
        </div>
    </div>
</div>

<!-- Map Section -->
<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="mb-3"><i class="fa fa-map-marker-alt text-primary"></i> Assigned Patient Live Location</h4>
            <div id="map"></div>
            <p class="text-muted mt-2">Last updated: <span id="last-updated">{{ location.updated_at }}</span></p>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="container-fluid bg-dark text-light py-4 text-center">
    &copy; DementiaCare. All Rights Reserved.
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='assets/js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='assets/js/main.js') }}"></script>


<script>
    let map;
    let marker;

    function initMap() {
        const initialPosition = { 
            lat: parseFloat("{{ location.latitude }}"), 
            lng: parseFloat("{{ location.longitude }}") 
        };

        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 15,
            center: initialPosition
        });

        marker = new google.maps.Marker({
            position: initialPosition,
            map: map,
            title: "Patient Location"
        });
    }

    function updateLocation() {
        fetch(`/api/patient/{{ patient_id }}/location`)
            .then(res => res.json())
            .then(data => {
                if (!data.latitude || !data.longitude) return;
                const pos = { lat: parseFloat(data.latitude), lng: parseFloat(data.longitude) };
                marker.setPosition(pos);
                map.setCenter(pos);
                document.getElementById('last-updated').innerText = data.updated_at || "Just now";
            });
    }

    // Update every 5 seconds
    setInterval(updateLocation, 5000);
</script>

<script async
    src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap">
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>DementiaCare | Chatbot Logs</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Favicon -->
    <link href="{{ url_for('static', filename='assets/img/favicon.ico') }}" rel="icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="{{ url_for('static', filename='assets/css/bootstrap.min.css') }}" rel="stylesheet">

    <!-- Template CSS -->
    <link href="{{ url_for('static', filename='assets/css/style.css') }}" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white navbar-light shadow-sm px-5 py-3 py-lg-0">
    <a href="{{ url_for('caregiver_dashboard') }}" class="navbar-brand p-0">
        <h1 class="m-0 text-primary"><i class="fa fa-brain"></i>DementiaCare</h1>
    </a>
    <div class="collapse navbar-collapse">
        <div class="navbar-nav ms-auto py-0">
            <a href="{{ url_for('caregiver_dashboard') }}" class="nav-item nav-link">Dashboard</a>
            <a href="{{ url_for('logout') }}" class="nav-item nav-link text-danger">Logout</a>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="container-fluid bg-primary py-5 hero-header mb-5">
    <div class="row py-3">
        <div class="col-12 text-center">
            <h1 class="display-3 text-white animated zoomIn">Chatbot Logs</h1>
            <a href="{{ url_for('caregiver_dashboard') }}" class="h4 text-white">Dashboard</a>
            <i class="far fa-circle text-white px-2"></i>
            <a href="#" class="h4 text-white">Logs</a>
        </div>
    </div>
</div>

<!-- Chatbot Logs Table -->
<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="mb-4">Chatbot Logs</h3>
            {% if logs and logs|length > 0 %}
            <div class="table-responsive">
                <table class="table table-hover table-striped align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Question</th>
                            <th>Answer</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for l in logs %}
                        <tr>
                            <td>{{ l.question }}</td>
                            <td>{{ l.answer }}</td>
                            <td>{{ l.timestamp }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            {% else %}
            <div class="alert alert-info mb-0">No chatbot logs available.</div>
            {% endif %}
        </div>
    </div>
</div>

<!-- Footer -->
<div class="container-fluid bg-dark text-light py-4 text-center">
    &copy; DementiaCare. All Rights Reserved.
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="{{ url_for('static', filename='assets/js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='assets/js/main.js') }}"></script>

</body>
</html>
